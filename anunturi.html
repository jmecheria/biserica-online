<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anunțuri — Parohia Stornești</title>
<link rel="stylesheet" href="style.css">
<style>
.page-hero {
  background: var(--visniu-deep);
  padding: 3rem 2rem;
  text-align: center;
  border-bottom: 2px solid var(--gold-dim);
}
.page-hero h1 { font-family:'Cinzel',serif; font-size:clamp(26px,4vw,44px); color:var(--gold); font-weight:600; margin-bottom:0.4rem; }
.page-hero p { color:rgba(250,245,236,0.55); font-size:15px; font-style:italic; }

.anunturi-wrapper {
  max-width: 900px;
  margin: 0 auto;
  padding: 3rem 2rem;
}

/* Filter tabs */
.filter-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 2.5rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border-red);
}
.tab-btn {
  background: white;
  border: 1px solid var(--border-red);
  color: var(--muted);
  font-family: 'Raleway', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 7px 18px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { background: var(--gold-pale); color: var(--visniu); }
.tab-btn.active { background: var(--visniu); color: var(--gold); border-color: var(--visniu); }

/* Anunt card */
.anunt-card {
  background: white;
  border: 1px solid rgba(107,26,26,0.12);
  border-left: 5px solid var(--visniu);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1.75rem;
  margin-bottom: 1.5rem;
  transition: transform 0.15s, box-shadow 0.15s;
  position: relative;
}
.anunt-card:hover { transform: translateX(4px); box-shadow: var(--shadow); }
.anunt-card.urgent { border-left-color: #c0392b; }
.anunt-card.important { border-left-color: var(--gold); }

.anunt-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 0.75rem;
}
.anunt-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 3px 12px;
  border-radius: 20px;
}
.anunt-tag.general { background: var(--gold-pale); color: var(--gold-dim); }
.anunt-tag.urgent { background: #fdf0f0; color: #c0392b; border: 1px solid #f5c6c6; }
.anunt-tag.important { background: var(--gold-pale); color: var(--visniu); border: 1px solid var(--border); }
.anunt-tag.eveniment { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; }
.anunt-date { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
.anunt-title { font-family:'Cinzel',serif; font-size:20px; color:var(--visniu-dark); margin-bottom:0.75rem; line-height:1.3; }
.anunt-body { font-size:14px; color:var(--text); line-height:1.8; }
.anunt-cross {
  position: absolute;
  top: 1.5rem; right: 1.5rem;
  color: rgba(107,26,26,0.12);
  font-size: 28px;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--muted);
}
.empty-state .cross { font-size: 48px; display: block; margin-bottom: 1rem; color: rgba(107,26,26,0.2); }

/* Loading */
.loading-anim { text-align:center; padding:3rem; }
.loading-anim .spinner { width:40px;height:40px;border:3px solid var(--border-red);border-top-color:var(--visniu);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto; }
@keyframes spin{to{transform:rotate(360deg)}}

/* Pagination */
.pagination { display:flex; justify-content:center; gap:8px; margin-top:2rem; }
.pag-btn { border:1px solid var(--border-red); background:white; color:var(--muted); font-family:'Raleway',sans-serif; font-size:13px; padding:8px 16px; cursor:pointer; border-radius:var(--radius); }
.pag-btn:hover { background:var(--gold-pale); color:var(--visniu); }
.pag-btn.active { background:var(--visniu); color:var(--gold); border-color:var(--visniu); }
</style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">✝</div>
      <div class="nav-logo-text">
        <span class="name">Parohia Stornești</span>
        <span class="sub">Iași · Ortodoxă</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Acasă</a></li>
      <li><a href="produse.html">Magazin</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="anunturi.html" class="active">Anunțuri</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="nav-cart" onclick="window.location='cos.html'">
        🛒 Coș <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
    </div>
  </div>
</nav>

<div class="page-hero">
  <h1>Anunțuri Parohiale</h1>
  <p>Noutăți, evenimente și vești din comunitatea parohiei</p>
</div>

<div class="anunturi-wrapper">
  <div class="filter-tabs">
    <button class="tab-btn active" data-tag="toate" onclick="filterTag(this)">Toate</button>
    <button class="tab-btn" data-tag="general" onclick="filterTag(this)">General</button>
    <button class="tab-btn" data-tag="eveniment" onclick="filterTag(this)">Evenimente</button>
    <button class="tab-btn" data-tag="important" onclick="filterTag(this)">Importante</button>
    <button class="tab-btn" data-tag="urgent" onclick="filterTag(this)">Urgente</button>
  </div>

  <div id="anunturiList">
    <div class="loading-anim"><div class="spinner"></div></div>
  </div>
</div>

<footer class="site-footer">
  <span class="footer-cross">✝</span>
  <p class="footer-name">Parohia Stornești</p>
  <p class="footer-info">📍 Stornești, Județul Iași</p>
  <p class="footer-copy">© 2024 Parohia Stornești</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjQEkuNvLHWwBJsGWmu1LxLcOoS75pFjQ",
  authDomain: "biserica-online-d3f0a.firebaseapp.com",
  projectId: "biserica-online-d3f0a",
  storageBucket: "biserica-online-d3f0a.firebasestorage.app",
  messagingSenderId: "582958004765",
  appId: "1:582958004765:web:60a31c374b9e298c1964f4"
});
const db = getFirestore(app);

let ALL_ANUNTURI = [];
let currentTag = 'toate';

const MONTHS = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie',
                'Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];

async function loadAnunturi() {
  try {
    const q = query(collection(db, 'anunturi'), orderBy('createdAt','desc'));
    const snap = await getDocs(q);
    ALL_ANUNTURI = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAnunturi();
  } catch(e) {
    document.getElementById('anunturiList').innerHTML =
      `<div class="empty-state"><span class="cross">✝</span><p>Anunțurile nu pot fi încărcate momentan.</p></div>`;
  }
}

function renderAnunturi() {
  const filtered = currentTag === 'toate'
    ? ALL_ANUNTURI
    : ALL_ANUNTURI.filter(a => a.tag === currentTag);

  const el = document.getElementById('anunturiList');
  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><span class="cross">✝</span><p>Nu există anunțuri în această categorie.</p></div>`;
    return;
  }

  el.innerHTML = filtered.map(a => {
    const dt = a.createdAt?.toDate ? a.createdAt.toDate() : new Date(a.createdAt || Date.now());
    const dateStr = `${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`;
    const tag = a.tag || 'general';
    const tagLabels = { general:'General', urgent:'Urgent', important:'Important', eveniment:'Eveniment' };
    return `<div class="anunt-card ${tag}">
      <span class="anunt-cross">✝</span>
      <div class="anunt-meta">
        <span class="anunt-tag ${tag}">${tagLabels[tag] || tag}</span>
        <span class="anunt-date">📅 ${dateStr}</span>
      </div>
      <h2 class="anunt-title">${a.titlu || 'Anunț'}</h2>
      <p class="anunt-body">${(a.continut || '').replace(/\n/g,'<br>')}</p>
    </div>`;
  }).join('');
}

window.filterTag = function(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTag = btn.dataset.tag;
  renderAnunturi();
};

const cart = JSON.parse(localStorage.getItem('cart_stornesti') || '{}');
document.getElementById('cartBadge').textContent = Object.values(cart).reduce((s,v)=>s+v,0);

loadAnunturi();
</script>
</body>
</html>
