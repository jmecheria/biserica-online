<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anunturi — Parohia Stornesti</title>
<link rel="stylesheet" href="style.css">
<style>
.an-wrap{max-width:920px;margin:0 auto;padding:2.5rem 1.5rem;}
.filter-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:1.75rem;padding-bottom:1.4rem;border-bottom:1px solid var(--bdr);}
.tab-btn{background:white;border:1px solid var(--bdr);color:var(--muted);font-family:"Raleway",sans-serif;font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:7px 15px;border-radius:20px;cursor:pointer;transition:all .15s;}
.tab-btn:hover{background:var(--gold-p);color:var(--vis);}
.tab-btn.active{background:var(--vis);color:var(--gold);border-color:var(--vis);}
.urg-banner{background:#c0392b;border-radius:var(--r);margin-bottom:1.4rem;overflow:hidden;}
.urg-hd{display:flex;align-items:center;gap:9px;padding:.65rem 1.1rem;}
.urg-hd span{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:white;}
.urg-items{padding:0 1.1rem .8rem;display:flex;flex-direction:column;gap:7px;}
.urg-mini{background:rgba(255,255,255,.13);border-radius:var(--r);padding:.65rem .9rem;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:space-between;gap:9px;}
.urg-mini:hover{background:rgba(255,255,255,.22);}
.urg-mini-t{font-size:14px;color:white;font-weight:500;}
.urg-mini-d{font-size:11px;color:rgba(255,255,255,.55);white-space:nowrap;}
.an-list{display:flex;flex-direction:column;gap:.65rem;}
.an-card{background:white;border:1px solid rgba(107,26,26,.1);border-left:4px solid var(--vis);border-radius:0 var(--r) var(--r) 0;padding:.9rem 1.2rem;cursor:pointer;transition:transform .15s,box-shadow .15s;display:flex;align-items:center;gap:.85rem;}
.an-card:hover{transform:translateX(4px);box-shadow:2px 2px 12px rgba(107,26,26,.09);}
.an-card.urgent{border-left-color:#c0392b;background:#fff9f9;}
.an-card.important{border-left-color:var(--gold);}
.an-card.eveniment{border-left-color:#4338ca;}
.ac-l{flex:1;min-width:0;}
.ac-meta{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap;}
.ac-tag{font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:2px 8px;border-radius:20px;}
.ac-tag.general{background:var(--gold-p);color:var(--gold-d);}
.ac-tag.urgent{background:#fee2e2;color:#c0392b;}
.ac-tag.important{background:#fff7ed;color:#c2410c;}
.ac-tag.eveniment{background:#eef2ff;color:#4338ca;}
.ac-date{font-size:11px;color:var(--muted);}
.ac-title{font-family:"Cinzel",serif;font-size:15px;color:var(--vis-d);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ac-arr{color:rgba(107,26,26,.22);font-size:17px;flex-shrink:0;transition:color .15s;}
.an-card:hover .ac-arr{color:var(--vis);}
.am-img{width:100%;max-height:260px;object-fit:cover;border-radius:var(--r);margin-bottom:1.2rem;}
.am-meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:.85rem;}
.am-tag{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:3px 11px;border-radius:20px;}
.am-date{font-size:12px;color:var(--muted);}
.am-title{font-family:"Cinzel",serif;font-size:22px;color:var(--vis-d);margin-bottom:.85rem;line-height:1.3;}
.am-evdate{display:inline-flex;align-items:center;gap:7px;background:var(--gold-p);border:1px solid var(--border);color:var(--vis-d);font-size:13px;padding:5px 13px;border-radius:var(--r);margin-bottom:.9rem;}
.am-body{font-size:15px;color:var(--text);line-height:1.9;}
.am-urg{background:#fee2e2;border:1px solid #f5c6c6;border-radius:var(--r);padding:.75rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;gap:9px;font-size:13px;color:#c0392b;font-weight:500;}
.ems{text-align:center;padding:3rem 2rem;color:var(--muted);}
.ems .ei{font-size:46px;display:block;margin-bottom:1rem;opacity:.3;}
</style>
</head>
<body>
<nav class="nav"><div class="nav-in">
  <a href="index.html" class="nav-logo"><div class="nav-logo-icon">✝</div><div class="nav-logo-text"><span class="n">Parohia Stornesti</span><span class="s">Iasi · Ortodoxa</span></div></a>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Acasa</a></li><li><a href="produse.html">Magazin</a></li>
    <li><a href="calendar.html">Calendar</a></li><li><a href="anunturi.html" class="active">Anunturi</a></li>
  </ul>
  <div class="nav-r">
    <button class="nav-cart" onclick="window.location=\'cos.html\'">Cos <span class="cart-bdg" id="cartBdg">0</span></button>
    <a href="admin.html" class="nav-admin" title="Admin">⚙</a>
    <button class="hamburger" onclick="document.getElementById(\'navLinks\').classList.toggle(\'open\')">☰</button>
  </div>
</div></nav>
<div class="page-hero"><h1>Anunturi Parohiale</h1><p>Noutati si vesti din comunitate</p></div>
<div class="an-wrap">
  <div class="urg-banner" id="urgBanner" style="display:none">
    <div class="urg-hd"><span>🚨 Anunturi urgente</span></div>
    <div class="urg-items" id="urgItems"></div>
  </div>
  <div class="filter-tabs">
    <button class="tab-btn active" data-tag="toate" onclick="filterTag(this)">Toate</button>
    <button class="tab-btn" data-tag="general" onclick="filterTag(this)">General</button>
    <button class="tab-btn" data-tag="eveniment" onclick="filterTag(this)">Evenimente</button>
    <button class="tab-btn" data-tag="important" onclick="filterTag(this)">Importante</button>
    <button class="tab-btn" data-tag="urgent" onclick="filterTag(this)">Urgente</button>
  </div>
  <div id="anunturiList"><div class="loading-b"><div class="spinner"></div></div></div>
</div>
<div class="modal-ov" id="anuntModal">
  <div class="modal-box" style="max-width:650px">
    <div class="modal-hd"><h3 id="amTitle">Anunt</h3><button class="modal-close" onclick="closeAM()">✕</button></div>
    <div class="modal-body" id="amBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<footer class="site-footer"><span class="footer-cross">✝</span><p class="footer-name">Parohia Stornesti</p><p class="footer-info">Stornesti, Judetul Iasi</p><p class="footer-copy">© 2024 Parohia Stornesti</p></footer>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,getDocs,query,orderBy}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const app=initializeApp({apiKey:"AIzaSyDjQEkuNvLHWwBJsGWmu1LxLcOoS75pFjQ",authDomain:"biserica-online-d3f0a.firebaseapp.com",projectId:"biserica-online-d3f0a",storageBucket:"biserica-online-d3f0a.firebasestorage.app",messagingSenderId:"582958004765",appId:"1:582958004765:web:60a31c374b9e298c1964f4"});
const db=getFirestore(app);
const MO=["Ian","Feb","Mar","Apr","Mai","Iun","Iul","Aug","Sep","Oct","Nov","Dec"];
const TL={general:"General",eveniment:"Eveniment",important:"Important",urgent:"Urgent"};
let ALL=[],curTag="toate";
function fmtDate(ts){const d=ts?.toDate?ts.toDate():new Date(ts||Date.now());return d.getDate()+" "+MO[d.getMonth()]+" "+d.getFullYear();}
async function load(){
  try{
    const q=query(collection(db,"anunturi"),orderBy("createdAt","desc"));
    const snap=await getDocs(q);
    ALL=snap.docs.map(d=>({id:d.id,...d.data()}));
    ALL.sort((a,b)=>{if(a.pinned&&!b.pinned)return -1;if(!a.pinned&&b.pinned)return 1;return 0;});
    renderUrg();renderList();
  }catch(e){document.getElementById("anunturiList").innerHTML="<div class=\"ems\"><span class=\"ei\">📢</span><p>Anunturile nu pot fi incarcate.</p></div>";}
}
function renderUrg(){
  const u=ALL.filter(a=>a.tag==="urgent");if(!u.length)return;
  document.getElementById("urgBanner").style.display="block";
  document.getElementById("urgItems").innerHTML=u.map(a=>"<div class=\"urg-mini\" onclick=\"openAM(\'"+a.id+"\')\"><span class=\"urg-mini-t\">"+a.titlu+"</span><span class=\"urg-mini-d\">"+fmtDate(a.createdAt)+"</span></div>").join("");
}
function renderList(){
  const f=curTag==="toate"?ALL:ALL.filter(a=>a.tag===curTag);
  const el=document.getElementById("anunturiList");
  if(!f.length){el.innerHTML="<div class=\"ems\"><span class=\"ei\">📢</span><p>Nu exista anunturi.</p></div>";return;}
  el.innerHTML="<div class=\"an-list\">"+f.map(a=>"<div class=\"an-card "+(a.tag||"")+"\" onclick=\"openAM(\'"+a.id+"\')\"><div class=\"ac-l\"><div class=\"ac-meta\">"+(a.pinned?"<span style=\"font-size:10px;color:var(--gold-d)\">📌</span>":"")+"<span class=\"ac-tag "+(a.tag||"general")+"\">"+(TL[a.tag]||"General")+"</span><span class=\"ac-date\">"+fmtDate(a.createdAt)+"</span></div><p class=\"ac-title\">"+(a.titlu||"Anunt")+"</p><p class=\"ac-preview\">"+(a.continut||"").substring(0,100)+"...</p></div><span class=\"ac-arr\">›</span></div>").join("")+"</div>";
}
window.filterTag=function(btn){document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");curTag=btn.dataset.tag;renderList();};
window.openAM=function(id){
  const a=ALL.find(x=>x.id===id);if(!a)return;
  document.getElementById("amTitle").textContent=a.titlu||"Anunt";
  const tag=a.tag||"general";
  const tagColors={urgent:"background:#fee2e2;color:#c0392b",eveniment:"background:#eef2ff;color:#4338ca",important:"background:#fff7ed;color:#c2410c",general:"background:var(--gold-p);color:var(--gold-d)"};
  document.getElementById("amBody").innerHTML=(tag==="urgent"?"<div class=\"am-urg\">⚠️ Anunt urgent — cititi cu atentie!</div>":"")+(a.imageUrl?"<img class=\"am-img\" src=\""+a.imageUrl+"\" alt=\"\">":"")+"<div class=\"am-meta\"><span class=\"am-tag\" style=\""+tagColors[tag]+"\">"+TL[tag]+"</span><span class=\"am-date\">"+fmtDate(a.createdAt)+"</span>"+(a.pinned?"<span style=\"font-size:11px;color:var(--gold-d)\">📌 Fixat</span>":"")+"</div>"+(a.eventDate?"<div class=\"am-evdate\">🗓 Data evenimentului: <strong>"+a.eventDate+"</strong></div>":"")+"<h2 class=\"am-title\">"+a.titlu+"</h2><div class=\"am-body\">"+(a.continut||"").replace(/\n/g,"<br>")+"</div>";
  document.getElementById("anuntModal").classList.add("open");
};
window.closeAM=()=>document.getElementById("anuntModal").classList.remove("open");
document.getElementById("anuntModal").addEventListener("click",e=>{if(e.target===e.currentTarget)window.closeAM();});
const c=JSON.parse(localStorage.getItem("cart_stornesti")||"{}");
document.getElementById("cartBdg").textContent=Object.values(c).reduce((s,v)=>s+v,0);
load();
</script>
</body>
</html>
