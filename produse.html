<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magazin — Parohia Stornești</title>
<link rel="stylesheet" href="style.css">
<style>
.page-hero {
  background: var(--visniu-deep);
  padding: 3rem 2rem;
  text-align: center;
  border-bottom: 2px solid var(--gold-dim);
}
.page-hero h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(26px, 4vw, 44px);
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 0.4rem;
}
.page-hero p { color: rgba(250,245,236,0.55); font-size: 15px; font-style: italic; }

.shop-layout {
  max-width: 1280px;
  margin: 0 auto;
  padding: 2.5rem 2rem;
  display: grid;
  grid-template-columns: 240px 1fr;
  gap: 2rem;
  align-items: start;
}
@media(max-width:900px){ .shop-layout{grid-template-columns:1fr;} }

/* SIDEBAR FILTERS */
.filters-sidebar {
  background: white;
  border: 1px solid var(--border-red);
  border-top: 3px solid var(--visniu);
  border-radius: var(--radius);
  padding: 1.5rem;
  position: sticky;
  top: 88px;
}
.filter-title {
  font-family: 'Cinzel', serif;
  font-size: 14px;
  color: var(--visniu-dark);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border-red);
}
.filter-cat-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: none;
  border: none;
  font-family: 'Raleway', sans-serif;
  font-size: 13px;
  color: var(--muted);
  padding: 8px 10px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: background 0.15s, color 0.15s;
  margin-bottom: 2px;
}
.filter-cat-btn:hover { background: var(--gold-pale); color: var(--visniu); }
.filter-cat-btn.active { background: var(--visniu); color: var(--gold); font-weight: 500; }
.filter-sep { height: 1px; background: var(--border-red); margin: 1rem 0; }
.filter-sort-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block; }
.filter-sort {
  width: 100%;
  border: 1px solid var(--border-red);
  background: white;
  font-family: 'Raleway', sans-serif;
  font-size: 13px;
  color: var(--text);
  padding: 8px;
  border-radius: var(--radius);
}
.filter-search {
  width: 100%;
  border: 1px solid var(--border-red);
  background: white;
  font-family: 'Raleway', sans-serif;
  font-size: 13px;
  color: var(--text);
  padding: 8px 12px;
  border-radius: var(--radius);
  margin-bottom: 1rem;
  outline: none;
}
.filter-search:focus { border-color: var(--visniu); }

/* PRODUCTS */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.5rem;
}
.product-card {
  background: white;
  border: 1px solid rgba(107,26,26,0.12);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
}
.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 32px rgba(107,26,26,0.12);
}
.product-img {
  width: 100%;
  aspect-ratio: 1;
  background: var(--gold-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  position: relative;
  overflow: hidden;
}
.product-img img {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}
.product-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--visniu);
  color: var(--gold);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 3px 10px;
  border-radius: 20px;
}
.product-body { padding: 1.1rem; }
.product-cat {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold-dim);
  margin-bottom: 5px;
}
.product-name {
  font-family: 'Cinzel', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--visniu-dark);
  line-height: 1.3;
  margin-bottom: 5px;
}
.product-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 0.9rem;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.product-price {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--visniu-dark);
}
.product-price span { font-size: 12px; color: var(--muted); font-family:'Raleway',sans-serif; font-weight:400; }
.add-to-cart-btn {
  background: var(--visniu);
  color: var(--gold);
  border: none;
  font-family: 'Raleway', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  padding: 8px 14px;
  cursor: pointer;
  border-radius: var(--radius);
  transition: background 0.15s;
  white-space: nowrap;
}
.add-to-cart-btn:hover { background: var(--visniu-mid); }
.stock-out {
  font-size: 11px;
  color: #c0392b;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* RESULTS BAR */
.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border-red);
}
.results-count { font-size: 13px; color: var(--muted); }
.results-count strong { color: var(--visniu); }

/* CART SIDEBAR */
.cart-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44,8,8,0.55);
  z-index: 200;
}
.cart-overlay.open { display: block; }
.cart-panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: min(420px, 95vw);
  background: var(--cream);
  border-left: 2px solid var(--gold-dim);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(.23,1,.32,1);
}
.cart-panel.open { transform: translateX(0); }
.cart-head {
  background: var(--visniu-deep);
  padding: 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.cart-head h3 {
  font-family: 'Cinzel', serif;
  font-size: 20px;
  color: var(--gold);
  font-weight: 600;
}
.close-cart {
  background: none;
  border: none;
  color: rgba(201,168,76,0.6);
  font-size: 22px;
  cursor: pointer;
  line-height: 1;
}
.close-cart:hover { color: var(--gold); }
.cart-items-list { flex: 1; overflow-y: auto; padding: 1.5rem; }
.cart-item {
  display: flex;
  gap: 1rem;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border-red);
  align-items: center;
}
.cart-item-icon {
  width: 52px; height: 52px;
  background: var(--gold-pale);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
  border: 1px solid var(--border);
}
.cart-item-info { flex: 1; }
.cart-item-name { font-family:'Cinzel',serif; font-size:14px; color:var(--visniu-dark); margin-bottom:3px; line-height:1.3; }
.cart-item-price { font-size:14px; color:var(--gold-dim); font-weight:500; }
.qty-ctrl { display:flex; align-items:center; gap:6px; }
.qty-btn {
  width:26px; height:26px;
  border:1px solid var(--border-red);
  background:white;
  cursor:pointer;
  font-size:15px;
  display:flex; align-items:center; justify-content:center;
  border-radius:var(--radius); color:var(--visniu);
}
.qty-btn:hover { background:var(--gold-pale); }
.qty-num { font-size:14px; font-weight:500; min-width:18px; text-align:center; }
.cart-foot {
  padding:1.5rem;
  border-top: 2px solid var(--border);
  background: white;
}
.cart-total-row {
  display:flex; justify-content:space-between;
  align-items:center; margin-bottom:1.25rem;
}
.cart-total-label { font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); }
.cart-total-val { font-family:'Cinzel',serif; font-size:28px; color:var(--visniu-dark); }
.checkout-btn {
  width:100%;
  background:var(--visniu);
  color:var(--gold);
  border:1px solid var(--gold-dim);
  font-family:'Raleway',sans-serif;
  font-size:12px; font-weight:600;
  letter-spacing:0.2em; text-transform:uppercase;
  padding:15px; cursor:pointer;
  border-radius:var(--radius);
  transition:background 0.2s;
}
.checkout-btn:hover { background:var(--visniu-mid); }
.empty-cart-msg { text-align:center; padding:3rem 1rem; color:var(--muted); }
.empty-cart-msg .big { font-size:48px; display:block; margin-bottom:1rem; }

/* LOADING SPINNER */
.loading-grid { display:flex; justify-content:center; align-items:center; min-height:300px; }
.spinner { width:40px; height:40px; border:3px solid var(--border-red); border-top-color:var(--visniu); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<nav class="main-nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">✝</div>
      <div class="nav-logo-text">
        <span class="name">Parohia Stornești</span>
        <span class="sub">Iași · Ortodoxă</span>
      </div>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Acasă</a></li>
      <li><a href="produse.html" class="active">Magazin</a></li>
      <li><a href="calendar.html">Calendar</a></li>
      <li><a href="anunturi.html">Anunțuri</a></li>
    </ul>
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="nav-cart" onclick="openCart()">
        🛒 Coș <span class="cart-badge" id="cartBadge">0</span>
      </button>
      <button class="hamburger" onclick="document.getElementById('navLinks').classList.toggle('open')">☰</button>
    </div>
  </div>
</nav>

<div class="page-hero">
  <h1>Magazin Bisericesc</h1>
  <p>Obiecte sfinte pentru suflet, casă și altar</p>
</div>

<div class="shop-layout">
  <!-- SIDEBAR -->
  <aside class="filters-sidebar">
    <p class="filter-title">✝ Filtrare</p>
    <input type="text" class="filter-search" id="searchInput" placeholder="Caută produs..." oninput="applyFilters()">
    <button class="filter-cat-btn active" data-cat="toate" onclick="setCat(this)">Toate produsele</button>
    <button class="filter-cat-btn" data-cat="icoane" onclick="setCat(this)">🖼 Icoane</button>
    <button class="filter-cat-btn" data-cat="lumanari" onclick="setCat(this)">🕯 Lumânări & Candele</button>
    <button class="filter-cat-btn" data-cat="obiecte-cult" onclick="setCat(this)">✝ Obiecte de cult</button>
    <button class="filter-cat-btn" data-cat="carti" onclick="setCat(this)">📖 Cărți & CD-uri</button>
    <button class="filter-cat-btn" data-cat="vesminte" onclick="setCat(this)">👘 Veșminte</button>
    <button class="filter-cat-btn" data-cat="tamaie" onclick="setCat(this)">💨 Tămâie & Uleiuri</button>
    <button class="filter-cat-btn" data-cat="accesorii" onclick="setCat(this)">📿 Accesorii</button>
    <div class="filter-sep"></div>
    <span class="filter-sort-label">Sortare</span>
    <select class="filter-sort" id="sortSel" onchange="applyFilters()">
      <option value="default">Standard</option>
      <option value="price-asc">Preț ↑</option>
      <option value="price-desc">Preț ↓</option>
      <option value="name">Alfabetic</option>
    </select>
  </aside>

  <!-- PRODUCTS AREA -->
  <main>
    <div class="results-bar">
      <p class="results-count">Afișate: <strong id="countLabel">0</strong> produse</p>
    </div>
    <div id="productsContainer">
      <div class="loading-grid"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-head">
    <h3>✝ Coșul meu</h3>
    <button class="close-cart" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items-list" id="cartItemsList"></div>
  <div class="cart-foot" id="cartFoot" style="display:none">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-val" id="cartTotal">0 lei</span>
    </div>
    <button class="checkout-btn" onclick="window.location='cos.html'">Finalizează comanda →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer class="site-footer">
  <span class="footer-cross">✝</span>
  <p class="footer-name">Parohia Stornești</p>
  <p class="footer-info">📍 Stornești, Județul Iași</p>
  <p class="footer-copy">© 2024 Parohia Stornești</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDjQEkuNvLHWwBJsGWmu1LxLcOoS75pFjQ",
  authDomain: "biserica-online-d3f0a.firebaseapp.com",
  projectId: "biserica-online-d3f0a",
  storageBucket: "biserica-online-d3f0a.firebasestorage.app",
  messagingSenderId: "582958004765",
  appId: "1:582958004765:web:60a31c374b9e298c1964f4"
});
const db = getFirestore(app);

let ALL_PRODUCTS = [];
let currentCat = 'toate';

const CAT_LABELS = {
  icoane:'Icoane', lumanari:'Lumânări & Candele',
  'obiecte-cult':'Obiecte de cult', carti:'Cărți & CD-uri',
  vesminte:'Veșminte', tamaie:'Tămâie & Uleiuri', accesorii:'Accesorii'
};

// Load products from Firestore
async function loadProducts() {
  try {
    const snap = await getDocs(collection(db, 'products'));
    ALL_PRODUCTS = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                          .filter(p => p.active !== false);
    window.applyFilters();
  } catch(e) {
    document.getElementById('productsContainer').innerHTML =
      `<p style="text-align:center;color:var(--muted);padding:3rem;">Nu s-au putut încărca produsele. Verificați conexiunea.</p>`;
  }
}

window.currentCat = 'toate';

window.setCat = function(btn) {
  document.querySelectorAll('.filter-cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.currentCat = btn.dataset.cat;
  window.applyFilters();
};

window.applyFilters = function() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSel').value;
  let prods = [...ALL_PRODUCTS];

  if (window.currentCat !== 'toate') prods = prods.filter(p => p.cat === window.currentCat);
  if (search) prods = prods.filter(p =>
    p.name?.toLowerCase().includes(search) || p.desc?.toLowerCase().includes(search));
  if (sort === 'price-asc') prods.sort((a,b) => a.price - b.price);
  else if (sort === 'price-desc') prods.sort((a,b) => b.price - a.price);
  else if (sort === 'name') prods.sort((a,b) => a.name.localeCompare(b.name));

  document.getElementById('countLabel').textContent = prods.length;
  renderProducts(prods);
};

function renderProducts(prods) {
  const el = document.getElementById('productsContainer');
  if (!prods.length) {
    el.innerHTML = `<p style="text-align:center;color:var(--muted);padding:3rem;font-style:italic;">Nu există produse în această categorie.</p>`;
    return;
  }
  el.innerHTML = `<div class="products-grid">${prods.map(p => {
    const inStock = (p.stock ?? 1) > 0;
    return `<div class="product-card">
      <div class="product-img">
        ${p.badge ? `<div class="product-badge">${p.badge}</div>` : ''}
        ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" loading="lazy">` : `<span>${p.icon || '✝'}</span>`}
      </div>
      <div class="product-body">
        <p class="product-cat">${CAT_LABELS[p.cat] || p.cat || ''}</p>
        <h3 class="product-name">${p.name}</h3>
        <p class="product-desc">${p.desc || ''}</p>
        <div class="product-footer">
          <p class="product-price">${p.price} <span>lei</span></p>
          ${inStock
            ? `<button class="add-to-cart-btn" onclick="addCart('${p.id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.icon||'✝'}')">+ Adaugă</button>`
            : `<span class="stock-out">Epuizat</span>`}
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── CART ──
let cart = JSON.parse(localStorage.getItem('cart_stornesti') || '{}');
let cartProducts = JSON.parse(localStorage.getItem('cart_prods_stornesti') || '{}');

function saveCart() {
  localStorage.setItem('cart_stornesti', JSON.stringify(cart));
  localStorage.setItem('cart_prods_stornesti', JSON.stringify(cartProducts));
}

window.addCart = function(id, name, price, icon) {
  cart[id] = (cart[id] || 0) + 1;
  cartProducts[id] = { name, price, icon };
  saveCart();
  updateCartUI();
  showToast(`✝ "${name}" adăugat în coș`);
};

window.removeCart = function(id) {
  if (cart[id] > 1) cart[id]--; else delete cart[id];
  saveCart();
  updateCartUI();
};

function updateCartUI() {
  const total = Object.values(cart).reduce((s,v) => s+v, 0);
  document.getElementById('cartBadge').textContent = total;

  const list = document.getElementById('cartItemsList');
  const foot = document.getElementById('cartFoot');
  const amount = Object.entries(cart).reduce((s,[id,qty]) => s + (cartProducts[id]?.price||0)*qty, 0);

  if (!total) {
    list.innerHTML = `<div class="empty-cart-msg"><span class="big">🛒</span><p>Coșul tău este gol.</p></div>`;
    foot.style.display = 'none';
    return;
  }
  list.innerHTML = Object.entries(cart).map(([id,qty]) => {
    const p = cartProducts[id];
    if (!p) return '';
    return `<div class="cart-item">
      <div class="cart-item-icon">${p.icon}</div>
      <div class="cart-item-info">
        <p class="cart-item-name">${p.name}</p>
        <p class="cart-item-price">${p.price * qty} lei</p>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="removeCart('${id}')">−</button>
        <span class="qty-num">${qty}</span>
        <button class="qty-btn" onclick="addCart('${id}','${p.name.replace(/'/g,"\\'")}',${p.price},'${p.icon}')">+</button>
      </div>
    </div>`;
  }).join('');
  foot.style.display = 'block';
  document.getElementById('cartTotal').textContent = amount + ' lei';
}

window.openCart = function() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
};
window.closeCart = function() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
};

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

updateCartUI();
loadProducts();
</script>
</body>
</html>
